<script type="text/babel">
const { useState, useRef, useEffect } = React;

const REGIME_KEYS = ['light','mid','dark'];

function App() {
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('arx-kit-theme') || 'light'; } catch(e) { return 'light'; }
  });
  const [tab, setTab] = useState('home');
  const [toast, setToast] = useState(null);
  const [phase, setPhase] = useState(() => {
    try { return localStorage.getItem('arx-onboarded') ? 'app' : 'onboard'; } catch(e) { return 'onboard'; }
  });
  const [sub, setSub] = useState(null);              // {id, params} — merged sub-screens
  const [flip, setFlip] = useState(() => {           // C4 · profit-color convention
    try { return localStorage.getItem('arx-flip-regime') === '1'; } catch(e) { return false; }
  });
  const [frame, setFrame] = useState(() => {         // C9 · iOS bezel toggle
    try { return localStorage.getItem('arx-frame') !== '0'; } catch(e) { return true; }
  });
  const [lang, setLang] = useState('English');
  const [lucidOpen, setLucidOpen] = useState(false);
  const [lucidSeed, setLucidSeed] = useState(null);
  const [searchOpen, setSearchOpen] = useState(false);
  const [searchSeed, setSearchSeed] = useState('');
  const [searchVoice, setSearchVoice] = useState(false);
  useEffect(() => {
    window.__arxOpenLucid = (seed) => { setLucidSeed(seed || null); setLucidOpen(true); };
    window.__arxOpenSearch = (q, opts) => { setSearchSeed(q || ''); setSearchVoice(!!(opts && opts.voice)); setSearchOpen(true); };
    window.__arxGoTab = (t) => { setSub(null); setTab(t); };
    window.__arxTradeSide = (sym, side) => { window.__arxPendingSide = side; };
    return () => { delete window.__arxOpenLucid; delete window.__arxOpenSearch; delete window.__arxGoTab; };
  }, []);
  const appRef = useRef(null);

  const dark = theme === 'dark';
  useEffect(() => {
    try { localStorage.setItem('arx-kit-theme', theme); } catch(e) {}
    document.body.style.background = dark ? '#08071A' : '#E5E5EA';
    const lab = document.querySelector('.label');
    if (lab) lab.style.color = dark ? '#5A5480' : '#8E8E93';
  }, [theme]);
  useEffect(() => { try { localStorage.setItem('arx-flip-regime', flip ? '1' : '0'); } catch(e) {} }, [flip]);
  useEffect(() => { try { localStorage.setItem('arx-frame', frame ? '1' : '0'); } catch(e) {} }, [frame]);

  // C4 — swap up/down regime tokens at runtime (theme-aware: reads computed values, then crosses them)
  useEffect(() => {
    const el = appRef.current;
    if (!el) return;
    REGIME_KEYS.forEach(k => { el.style.removeProperty('--regime-up-'+k); el.style.removeProperty('--regime-down-'+k); });
    if (!flip) return;
    const cs = getComputedStyle(el);
    REGIME_KEYS.forEach(k => {
      const up = cs.getPropertyValue('--regime-up-'+k);
      const down = cs.getPropertyValue('--regime-down-'+k);
      el.style.setProperty('--regime-up-'+k, down);
      el.style.setProperty('--regime-down-'+k, up);
    });
  }, [flip, theme, phase]);

  // sub-screen opener — reachable from any screen file
  useEffect(() => {
    window.__arxOpenSub = (id, params = {}) => setSub({ id, params });
    return () => { delete window.__arxOpenSub; };
  }, []);

  const toastTimer = useRef(null);
  const dismissToast = () => { if (toastTimer.current) clearTimeout(toastTimer.current); toastTimer.current = null; setToast(null); };
  const showToast = (m) => { if (toastTimer.current) clearTimeout(toastTimer.current); setToast(m); toastTimer.current = setTimeout(() => { setToast(null); toastTimer.current = null; }, 3600); };
  // Warm ALL live feeds on entering the app so Lucid + Markets have a fresh snapshot ready.
  useEffect(() => {
    if (phase !== 'app') return;
    try { window.arxKickLiveNews && window.arxKickLiveNews(true); } catch(e){}
    try { window.arxQuantLoad && window.arxQuantLoad(true); } catch(e){}
    try { window.loadTagCatalog && window.loadTagCatalog(); } catch(e){}
    try { window.loadWarehouseSnapshot && window.loadWarehouseSnapshot(); } catch(e){}
    try { window.arxLoadElon && window.arxLoadElon(); } catch(e){}
  }, [phase]);

  const finishOnboarding = () => { try { localStorage.setItem('arx-onboarded','1'); } catch(e) {} setPhase('app'); setTab('home'); if (window.arxRefreshNewsOnLogin) window.arxRefreshNewsOnLogin(); };
  const signOut = () => { try { localStorage.removeItem('arx-onboarded'); } catch(e) {} setSub(null); setPhase('onboard'); showToast('Logged out'); };

  // Trade confirmation tier — Standard (hold) | Express
  const [confirmMode, setConfirmMode] = useState(() => {
    try { return localStorage.getItem('arx-confirm-mode') || 'hold'; } catch(e) { return 'hold'; }
  });
  const [consentOpen, setConsentOpen] = useState(false);
  useEffect(() => { try { localStorage.setItem('arx-confirm-mode', confirmMode); } catch(e) {} }, [confirmMode]);
  const requestExpress = () => setConsentOpen(true);
  const enableExpress = () => { setConfirmMode('express'); setConsentOpen(false); showToast('Express on — orders submit on tap'); };
  const disableExpress = () => { setConfirmMode('hold'); showToast('Back to Hold confirmation'); };

  // Trade tab is context-aware: deep-links set the asset; tapping the tab resumes your last/largest.
  const [tradeSym, setTradeSym] = useState(() => { try { return localStorage.getItem('arx-last-trade') || 'SOL'; } catch(e) { return 'SOL'; } });
  const goTrade = (s) => { const sym = s || tradeSym || 'SOL'; setTradeSym(sym); try { localStorage.setItem('arx-last-trade', sym); } catch(e) {} setSub(null); setTab('trade'); };
  useEffect(() => { window.__arxTrade = goTrade; window.__arxToast = showToast; return () => { delete window.__arxTrade; delete window.__arxToast; }; });

  const closeSub = () => setSub(null);
  const subView = sub && (
    <div style={{position:'absolute', inset:0, zIndex:60}}>
      {sub.id==='copyDetails'   && <CopyDetailsScreen f={sub.params.f} onBack={closeSub} onToast={showToast}/>}
      {sub.id==='signals'       && <SignalsScreen m={sub.params.m} onBack={closeSub}/>}
      {sub.id==='notifications' && <NotificationsScreen onBack={closeSub}/>}
      {sub.id==='news'          && <NewsScreen onBack={closeSub}/>}
      {sub.id==='newsImmersive' && <NewsImmersive startId={sub.params&&sub.params.startId} list={sub.params&&sub.params.list} filter={sub.params&&sub.params.filter} onClose={closeSub}/>}
      {sub.id==='newsArticle'   && <NewsArticleScreen id={sub.params.id} onBack={closeSub}/>}
      {sub.id==='account'       && <AccountScreen onBack={closeSub} flip={flip} setFlip={setFlip} frame={frame} setFrame={setFrame} lang={lang} setLang={setLang} onToast={showToast}/>}
      {sub.id==='contests'      && <ContestsScreen onBack={closeSub} onToast={showToast} onBadges={()=>setSub({id:'badges', params:{}})}/>}
      {sub.id==='badges'        && <BadgesScreen onBack={()=>setSub({id:'contests', params:{}})}/>}
      {sub.id==='contestWC'     && <ContestWC onBack={closeSub}/>}
      {sub.id==='contestNBA'    && <ContestNBA onBack={closeSub}/>}
      {sub.id==='contestNVDA'   && <ContestNVDA onBack={closeSub}/>}
      {sub.id==='arxLeaderboard' && <ArxLeaderboard onBack={closeSub}/>}
      {sub.id==='liveTrade'      && <LiveTradeScreen onBack={closeSub}/>}
      {sub.id==='liveTradeRoom'  && <LiveTradeRoomScreen roomId={sub.params.room} onBack={closeSub} onToast={showToast}/>}
      {sub.id==='pnlShare'      && <PnLShareCard pos={sub.params.pos} onClose={closeSub} onToast={showToast}/>}
      {sub.id==='rewards'       && <RewardsScreen params={sub.params} onBack={closeSub} onToast={showToast}/>}
      {sub.id==='earn'          && window.EarnHub && <EarnHub onBack={closeSub} onToast={showToast}/>}
      {sub.id==='dataSources'   && window.DataSourcesScreen && <DataSourcesScreen onBack={closeSub} onToast={showToast}/>}
      {sub.id==='liveArticle'   && window.LiveArticleScreen && <LiveArticleScreen item={sub.params.item} onBack={closeSub}/>}
      {sub.id==='funding'       && <FundingFlow onClose={closeSub} onToast={showToast}/>}
      {sub.id==='walletDetail'     && <WalletDetail key={sub.params.w && sub.params.w.addr} w={sub.params.w} onBack={closeSub} onToast={showToast} onClaim={(w)=>setSub({id:'claim', params:{w}})}/>}
      {sub.id==='claim'            && <ClaimSheet w={sub.params.w} onClose={()=>setSub({id:'walletDetail', params:{w:sub.params.w}})} onToast={showToast}/>}
      {sub.id==='copySetup'        && <CopySetupSheet w={sub.params.w} onClose={closeSub} onConfirm={(x)=>{ closeSub(); showToast('Copying '+(x.x||x.addr)+' — allocation set'); }}/>}
      {sub.id==='instrumentDetail' && <InstrumentDetail m={sub.params.m} onBack={closeSub} onToast={showToast} onTrade={()=>{ closeSub(); goTrade(sub.params.m && sub.params.m.sym); }}/>}
      {sub.id==='whatif'           && <WhatIfScreen sym={sub.params && sub.params.sym} onBack={closeSub} onToast={showToast}/>}
      {sub.id==='regime'           && <RegimeScreen onBack={closeSub}/>}
      {sub.id==='profile'          && window.ProfileScreen    && <ProfileScreen    onBack={closeSub} onToast={showToast}/>}
      {sub.id==='youSettings'      && window.SettingsScreen   && <SettingsScreen   onBack={closeSub} onToast={showToast} flip={false} setFlip={()=>{}} frame={true} setFrame={()=>{}}/>}
      {sub.id==='trackRecord'      && window.TrackRecordCard  && <TrackRecordCard  onClose={closeSub} onToast={showToast}/>}
      {sub.id==='profileQR'        && window.ProfileQR        && <ProfileQR        onClose={closeSub} onToast={showToast}/>}
      {sub.id==='managePos'        && <PositionManageSheet p={sub.params.p} onClose={closeSub} onToast={showToast}/>}
      {sub.id==='transfer'         && <TransferFlow onClose={closeSub} onToast={showToast}/>}
      {sub.id==='wallet'           && <WalletSheet onClose={closeSub} onToast={showToast}/>}
      {sub.id==='history'          && <HistoryScreen onBack={closeSub}/>}
    </div>
  );

  const inner = (
    <React.Fragment>
      <ArxAnimStyles/>
      <div ref={appRef} data-theme={dark ? 'cockpit-dark' : 'ios-light'} style={{position:'absolute', inset:0, background:'var(--surface-base)', color:'var(--text-primary)', overflow:'hidden'}}>
        {phase === 'onboard' ? (
          <OnboardFlow onDone={finishOnboarding}/>
        ) : (
          <React.Fragment>
            <div style={{position:'absolute', inset:0, zIndex:0, pointerEvents:'none', background:'radial-gradient(125% 55% at 12% 1%, rgba(124,91,255,.20) 0%, transparent 52%), radial-gradient(95% 42% at 100% 3%, rgba(124,91,255,.12) 0%, transparent 46%)'}}/>
            {tab==='home'    && <HomeScreen onTrade={(s)=>goTrade(typeof s==='string'?s:undefined)} onTabChange={setTab}/>}
            {tab==='wallets' && <WalletsScreen onCopy={(w)=>showToast(`Copying ${w.addr} — set allocation`)}/>}
            {tab==='trade'   && <TradeScreen sym={tradeSym} confirmMode={confirmMode} onRequestExpress={requestExpress} onDisableExpress={disableExpress} onConfirm={({side, amount, market, sym})=>showToast(`${market==='perp'?(side==='buy'?'Long':'Short'):(side==='buy'?'Bought':'Sold')} $${amount} ${sym||tradeSym} — order placed`)}/>}
            {tab==='markets' && <MarketsScreen/>}
            {tab==='you'     && <YouScreen onSignOut={signOut} onToast={showToast} confirmMode={confirmMode} onRequestExpress={requestExpress} onDisableExpress={disableExpress}/>}

            {consentOpen && <ExpressConsentSheet onClose={()=>setConsentOpen(false)} onEnable={enableExpress}/>}
            {lucidOpen && <LucidPanel seed={lucidSeed} onClose={()=>setLucidOpen(false)} onNavigate={setTab} onOpenSub={(id,params)=>setSub({id,params})}/>}
            {searchOpen && <SearchOverlay initialQuery={searchSeed} voice={searchVoice} onClose={()=>setSearchOpen(false)}/>}
            <div style={{position:'absolute', left:0, right:0, bottom:0, height:104, zIndex:35, pointerEvents:'none', background:'linear-gradient(to top, var(--surface-base) 26%, transparent)'}}/>
            <BottomTabBar active={tab} onChange={(t)=>{ setSub(null); setTab(t); }}/>
            {subView}
          </React.Fragment>
        )}

        {toast && (
          <div onClick={dismissToast} role="button" aria-label="Dismiss" className="arx-arrive" style={{
            position:'absolute', left:20, right:20, bottom:108, padding:'13px 12px 13px 16px',
            background:'rgba(20,18,42,.95)', backdropFilter:'blur(20px)', WebkitBackdropFilter:'blur(20px)',
            border:'.5px solid rgba(255,255,255,.08)', borderRadius:14,
            font:'600 14px var(--font-body)', color:'#EDE9FE', zIndex:99, cursor:'pointer',
            display:'flex', gap:10, alignItems:'center'
          }}>
            <IconCheck color="var(--regime-up-mid)" size={16}/>
            <span style={{flex:1, minWidth:0}}>{toast}</span>
            <span style={{flexShrink:0, width:28, height:28, borderRadius:'50%', display:'inline-flex', alignItems:'center', justifyContent:'center', background:'rgba(255,255,255,.16)', border:'.5px solid rgba(255,255,255,.18)'}}>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#EDE9FE" strokeWidth="2.6" strokeLinecap="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
            </span>
          </div>
        )}
      </div>
    </React.Fragment>
  );

  // Fit the fixed 402×874 device into whatever viewport we're shown in, so the
  // top status bar AND the bottom tab bar are always visible (never clipped).
  const [fit, setFit] = useState(1);
  useEffect(() => {
    const calc = () => setFit(Math.min(1, (window.innerHeight - 56) / 874, (window.innerWidth - 24) / 402));
    calc();
    window.addEventListener('resize', calc);
    return () => window.removeEventListener('resize', calc);
  }, []);

  const device = frame
    ? <IOSDevice dark={dark} width={402} height={874}>{inner}</IOSDevice>
    : <div style={{position:'relative', width:402, height:874, borderRadius:28, overflow:'hidden',
        boxShadow:'0 24px 80px rgba(0,0,0,.5)', background: dark ? '#0F0E14' : '#fff'}}>{inner}</div>;

  return (
    <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:16}}>
      <DemoPanel theme={theme} setTheme={setTheme}/>
      <div style={{width:402*fit, height:874*fit, flexShrink:0}}>
        <div id="arx-frame" style={{transform:`scale(${fit})`, transformOrigin:'top left', width:402, height:874}}>
          {device}
        </div>
      </div>
      {window.ScreenRecordButton && <ScreenRecordButton frameSel="#arx-frame"/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
